version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: facedetect-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-facedetect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-facedetect}
      POSTGRES_DB: ${POSTGRES_DB:-facedetect}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-facedetect} -d ${POSTGRES_DB:-facedetect}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - face-detection-net

  backend:
    build: ./backend
    container_name: facedetect-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ""
      POSTGRES_USER: ${POSTGRES_USER:-facedetect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-facedetect}
      POSTGRES_DB: ${POSTGRES_DB:-facedetect}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    networks:
      - face-detection-net

  frontend:
    build: ./frontend
    container_name: facedetect-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - face-detection-net

volumes:
  pg_data:

networks:
  face-detection-net:
    driver: bridge
