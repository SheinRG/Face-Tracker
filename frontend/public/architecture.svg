<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <marker id="arrowRight" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a1a1aa"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" rx="16" fill="#0a0a0a"/>

  <!-- Docker Compose border -->
  <rect x="30" y="30" width="840" height="440" rx="12" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-dasharray="8,6"/>
  <text x="60" y="58" fill="#a1a1aa" font-family="Inter, sans-serif" font-size="12" font-weight="600">DOCKER COMPOSE</text>

  <!-- Browser box (outside docker) -->
  <rect x="60" y="85" width="160" height="70" rx="10" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="140" y="115" fill="#fafafa" font-family="Inter, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Browser</text>
  <text x="140" y="135" fill="#a1a1aa" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">Webcam + Canvas</text>

  <!-- React Frontend box -->
  <rect x="310" y="85" width="200" height="70" rx="10" fill="#1a1a1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="410" y="115" fill="#fafafa" font-family="Inter, sans-serif" font-size="13" font-weight="600" text-anchor="middle">React Frontend</text>
  <text x="410" y="135" fill="#22c55e" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">:3000 (nginx)</text>

  <!-- FastAPI Backend box -->
  <rect x="310" y="230" width="200" height="110" rx="10" fill="#1a1a1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="410" y="260" fill="#fafafa" font-family="Inter, sans-serif" font-size="13" font-weight="600" text-anchor="middle">FastAPI Backend</text>
  <text x="410" y="280" fill="#22c55e" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">:8000 (uvicorn)</text>

  <!-- MediaPipe + Pillow sub-box inside backend -->
  <rect x="330" y="295" width="160" height="32" rx="6" fill="#111111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="410" y="316" fill="#a1a1aa" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">MediaPipe + Pillow</text>

  <!-- PostgreSQL box -->
  <rect x="650" y="245" width="170" height="80" rx="10" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="735" y="280" fill="#fafafa" font-family="Inter, sans-serif" font-size="13" font-weight="600" text-anchor="middle">PostgreSQL</text>
  <text x="735" y="300" fill="#a1a1aa" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">:5432</text>

  <!-- Arrow: Browser → Frontend (HTTP / assets) -->
  <line x1="220" y1="120" x2="305" y2="120" stroke="#a1a1aa" stroke-width="1.5" marker-end="url(#arrowRight)"/>
  <text x="262" y="110" fill="#a1a1aa" font-family="Inter, sans-serif" font-size="9" text-anchor="middle">HTTP / assets</text>

  <!-- Arrow: Frontend ↔ Backend (WS bidirectional) -->
  <line x1="390" y1="155" x2="390" y2="225" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="430" y1="225" x2="430" y2="155" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="460" y="195" fill="#22c55e" font-family="Inter, sans-serif" font-size="9">WS /video/ws/{`{id}`}</text>

  <!-- Arrow: Frontend → Backend (REST GET /roi/) -->
  <rect x="310" y="380" width="200" height="1" fill="none"/>
  <line x1="350" y1="155" x2="350" y2="195" stroke="#a1a1aa" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="350" y1="195" x2="580" y2="195" stroke="#a1a1aa" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="580" y1="195" x2="580" y2="395" stroke="#a1a1aa" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="580" y1="395" x2="515" y2="395" stroke="#a1a1aa" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowRight)"/>

  <!-- REST label box -->
  <rect x="530" y="377" width="100" height="22" rx="4" fill="#111111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="580" y="393" fill="#a1a1aa" font-family="Inter, sans-serif" font-size="9" text-anchor="middle">GET /roi/ (REST)</text>

  <!-- Arrow: Backend ↔ DB (asyncpg) -->
  <line x1="510" y1="285" x2="645" y2="285" stroke="#a1a1aa" stroke-width="1.5" marker-end="url(#arrowRight)"/>
  <text x="578" y="275" fill="#a1a1aa" font-family="Inter, sans-serif" font-size="9" text-anchor="middle">asyncpg / SQLAlchemy</text>

  <!-- Legend -->
  <rect x="60" y="420" width="300" height="38" rx="6" fill="#111111" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="80" y1="440" x2="110" y2="440" stroke="#22c55e" stroke-width="2"/>
  <text x="115" y="444" fill="#a1a1aa" font-family="Inter, sans-serif" font-size="9">WebSocket (real-time)</text>
  <line x1="220" y1="440" x2="250" y2="440" stroke="#a1a1aa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="255" y="444" fill="#a1a1aa" font-family="Inter, sans-serif" font-size="9">REST / HTTP</text>
</svg>
